services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: landing_page_app
    volumes:
      - .:/var/www/html
    environment:
      APP_DEBUG: "false"
      DB_HOST: db
      DB_DATABASE: landing_page
      DB_USER: landing_page
      DB_PASSWORD: landing_page
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: landing_page_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: landing_page_db
    restart: always
    environment:
      MYSQL_DATABASE: landing_page
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: landing_page
      MYSQL_PASSWORD: landing_page
    volumes:
      - landing_page_db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "landing_page", "-planding_page"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  landing_page_db_data:
